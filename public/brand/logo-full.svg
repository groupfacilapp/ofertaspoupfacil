<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 40" fill="none">
  <!-- Ícone: fundo indigo-600 -->
  <rect x="0" y="4" width="32" height="32" rx="8" fill="#4f46e5"/>
  <!-- Raio (Lucide Zap polygon, escalado de 24x24 para 20x20, offset +4 no Y) -->
  <polygon
    points="16.8,11.7 8.5,21.7 16,21.7 15.2,28.3 23.5,18.3 16,18.3"
    fill="white"
  />
  <!-- Texto "Dispara" em indigo-400 (#818cf8) -->
  <text
    x="42" y="27"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="19"
    letter-spacing="-0.3"
    fill="#818cf8"
  >Dispara</text>
  <!-- Texto "Zap" em branco -->
  <text
    x="118" y="27"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="19"
    letter-spacing="-0.3"
    fill="#ffffff"
  >Zap</text>
</svg>
